<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資金需求申請</title>

    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">
<div class="card">

<div class="header">
    <h1>資金需求申請</h1>
    <p>請完整填寫以下資料</p>
</div>

<form id="applyForm">

<div class="section-title">基本資料</div>

<div class="form-group">
    <label>姓名</label>
    <input type="text" id="name"
           required
           pattern="^[\u4e00-\u9fa5]+$"
           placeholder="請輸入中文姓名">
</div>

<div class="form-group">
    <label>出生年月日</label>

    <input type="text"
           id="birthdayText"
           inputmode="numeric"
           maxlength="8"
           placeholder="850101 或 19960101"
           required>
</div>

<div class="form-group">
    <label>職業</label>
    <input type="text" id="job" required>
</div>

<div class="form-group">
    <label>收入類型</label>
    <div class="radio-row">
        <label><input type="radio" name="incomeType" value="monthly" checked>月收</label>
        <label><input type="radio" name="incomeType" value="daily">日領</label>
    </div>
</div>

<div class="form-group">
    <label>收入金額</label>
    <input type="number" id="income" min="0" required>
</div>

<div class="section-title">聯絡方式</div>

<div class="form-group">
    <label>手機號碼</label>
    <input type="text"
           id="phone"
           inputmode="numeric"
           maxlength="10"
           pattern="09[0-9]{8}"
           required>
</div>

<div class="form-group">
    <label>LINE ID</label>
    <input type="text"
           id="lineId"
           inputmode="numeric"
           pattern="[0-9]*">
</div>

<div class="section-title">居住地區</div>

<div class="form-group">
    <label>縣市</label>
    <select id="city">
        <option>台北市</option>
        <option>新北市</option>
        <option>桃園市</option>
        <option>台中市</option>
        <option>台南市</option>
        <option>高雄市</option>
        <option>基隆市</option>
        <option>新竹市</option>
        <option>嘉義市</option>
        <option>新竹縣</option>
        <option>苗栗縣</option>
        <option>彰化縣</option>
        <option>南投縣</option>
        <option>雲林縣</option>
        <option>嘉義縣</option>
        <option>屏東縣</option>
        <option>宜蘭縣</option>
        <option>花蓮縣</option>
        <option>台東縣</option>
        <option>澎湖縣</option>
        <option>金門縣</option>
        <option>連江縣</option>
    </select>
</div>

<div class="form-group">
    <label>區 / 鄉鎮</label>
    <input type="text" id="district" required placeholder="請輸入區域">
</div>

<div class="section-title">資金需求</div>

<div class="form-group">
    <label>需求金額</label>
    <select id="loanAmount">
        <option value="3萬以下">3萬以下</option>
        <option value="4-7萬">4-7萬</option>
        <option value="8萬以上">8萬以上</option>
    </select>
</div>

<div class="form-group">
    <label>當品類型</label>
    <select id="collateralType">
        <option>汽車</option>
        <option>機車</option>
        <option>無當</option>
        <option>其他</option>
    </select>
</div>

<div class="form-group">
    <label>資金用途</label>
    <textarea id="loanPurpose" rows="4"></textarea>
</div>

<div class="form-group">
    <label>希望期數</label>
    <select id="installments">
        <option value="12">12期</option>
        <option value="24">24期</option>
        <option value="36">36期</option>
        <option value="48">48期</option>
        <option value="60">60期</option>
    </select>
</div>

<div class="section-title">外債狀況</div>

<div class="radio-group">
    <label>是否有外債</label>
    <div class="radio-row">
        <label><input type="radio" name="hasDebt" value="yes" checked>有</label>
        <label><input type="radio" name="hasDebt" value="no">無</label>
    </div>
</div>

<div class="form-group">
    <label>外債總額</label>
    <input type="number" id="debtAmount" min="0" value="0">
</div>

<div class="radio-group">
    <label>是否有遲繳紀錄</label>
    <div class="radio-row">
        <label><input type="radio" name="latePayment" value="yes">有</label>
        <label><input type="radio" name="latePayment" value="no" checked>無</label>
    </div>
</div>

<button type="submit" id="submitBtn">送出申請</button>

<div id="message"></div>

</form>

</div>
</div>

<script src="/script.js"></script>

</body>
</html>
